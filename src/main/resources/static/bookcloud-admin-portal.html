<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Access | BookCloud Secure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .secure-input:focus {
            animation: pulse-border 2s infinite;
        }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center font-sans antialiased">

<div class="w-full max-w-md p-4">
    <div class="bg-slate-900 rounded-3xl shadow-2xl p-10 border border-slate-800 relative overflow-hidden">
        <div class="absolute -top-24 -right-24 w-48 h-48 bg-blue-600/10 rounded-full blur-3xl"></div>

        <div class="relative z-10">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600/10 rounded-2xl mb-6 border border-blue-500/20">
                    <span class="text-4xl">🛡️</span>
                </div>
                <h1 class="text-2xl font-black text-white tracking-tight">System Access</h1>
                <p class="text-slate-500 text-sm mt-2 font-medium uppercase tracking-[0.2em]">Restricted Area</p>
            </div>

            <form id="systemAccessForm" class="space-y-6">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 ml-1">Master Access Code</label>
                    <input type="password"
                           id="accessCode"
                           required
                           autofocus
                           class="secure-input w-full px-5 py-4 bg-slate-950 border border-slate-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500/50 text-white placeholder-slate-700 transition-all duration-300 text-center tracking-[0.5em] text-xl"
                           placeholder="••••••••">
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl transition-all duration-300 shadow-lg shadow-blue-900/20 active:scale-[0.98]">
                    Verify Credentials
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-slate-800">
                <div class="flex justify-between items-center text-[10px] font-bold text-slate-600 uppercase tracking-tighter">
                    <div class="flex flex-col">
                        <span>Terminal: <span class="text-slate-400">BC-ADMIN-01</span></span>
                        <span>Status: <span class="text-green-500">Encrypted</span></span>
                    </div>
                    <div class="text-right">
                        <span>v1.0.4-stable</span>
                    </div>
                </div>
            </div>

            <div class="mt-6 text-center">
                <a href="welcome.html" class="text-slate-500 hover:text-blue-400 text-xs font-bold transition-colors uppercase tracking-widest">
                    ← Return to Library
                </a>
            </div>
        </div>
    </div>

    <p class="text-center text-slate-700 text-[10px] mt-6 font-medium uppercase tracking-widest">
        Unauthorized access attempts are logged and reported.
    </p>
</div>

<script>
    document.getElementById('systemAccessForm').addEventListener('submit', (e) => {
        e.preventDefault();

        const accessCode = document.getElementById('accessCode').value;

        // Используем твой секретный код
        if (accessCode === 'bookcloud2026admin') {
            // Эффект успешного входа
            const btn = e.target.querySelector('button');
            btn.innerText = 'Access Granted...';
            btn.classList.remove('bg-blue-600');
            btn.classList.add('bg-green-600');

            setTimeout(() => {
                window.location.href = 'admin-login.html';
            }, 600);
        } else {
            // Эффект ошибки
            const input = document.getElementById('accessCode');
            input.classList.add('border-red-500', 'animate-shake');
            alert('CRITICAL ERROR: Access Denied. Invalid Code.');
            input.value = '';

            setTimeout(() => {
                input.classList.remove('border-red-500', 'animate-shake');
            }, 500);
        }
    });
</script>

</body>
</html>
