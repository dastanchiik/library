<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300">

<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 dark:bg-gray-950 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-gray-700 dark:border-gray-800">
            <h1 class="text-2xl font-black italic">📚 BookCloud</h1>
            <p class="text-blue-400 text-xs font-bold tracking-widest uppercase mt-1">Admin Panel</p>
        </div>

        <nav class="flex-1 p-6 space-y-2">
            <a href="admin-dashboard.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📊 Dashboard</a>
            <!-- Новая кнопка Профиль -->
            <a href="admin-profile.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">👤 Мой профиль</a>

            <div class="my-4 border-t border-gray-800"></div> <!-- Разделитель -->

            <a href="admin-users.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">👥 Пользователи</a>
            <a href="admin-books.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📖 Книги</a>
            <a href="admin-orders.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📋 Заказы</a>
            <a href="admin-categories.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">🏷️ Категории</a>
        </nav>

        <div class="p-6 border-t border-gray-700 dark:border-gray-800 space-y-3">
            <button onclick="toggleDarkMode()" class="w-full px-4 py-2 bg-gray-800 text-gray-300 rounded-lg text-sm border border-gray-700 hover:bg-gray-700 transition">
                <span id="themeBtnText">🌙 Темный режим</span>
            </button>
            <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg font-bold transition duration-300">🚪 Выход</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="bg-white dark:bg-gray-800 shadow-sm p-6 flex justify-between items-center border-b dark:border-gray-700 transition-colors">
            <h2 class="text-3xl font-black text-gray-800 dark:text-white">Пользователи</h2>
            <button onclick="openUserModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 font-bold shadow-lg transition-all active:scale-95">
                + Добавить пользователя
            </button>
        </div>

        <div class="flex-1 overflow-auto p-8">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="p-6 border-b border-gray-50 dark:border-gray-700 flex justify-between items-center bg-gray-50/50 dark:bg-gray-800/50">
                    <div class="relative w-72">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                        <input type="text" id="userSearch" placeholder="Поиск..." class="w-full pl-10 pr-4 py-2 bg-white dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm transition">
                    </div>
                </div>

                <table class="w-full text-left">
                    <thead>
                    <tr class="text-[11px] font-black uppercase tracking-wider text-gray-400 dark:text-gray-500 border-b dark:border-gray-700">
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Пользователь</th>
                        <th class="px-6 py-4">Роль</th>
                        <th class="px-6 py-4">Баланс</th>
                        <th class="px-6 py-4 text-right">Действия</th>
                    </tr>
                    </thead>
                    <tbody id="usersTableBody" class="divide-y divide-gray-50 dark:divide-gray-700">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="userModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl p-8 w-full max-w-md border dark:border-gray-700">
        <h3 id="userModalTitle" class="text-2xl font-black text-gray-900 dark:text-white mb-6">Новый пользователь</h3>
        <form id="userForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">Полное имя</label>
                <input type="text" id="userFullName" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl outline-none">
            </div>
            <div>
                <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">Email</label>
                <input type="email" id="userEmail" required class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl outline-none">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">Роль</label>
                    <select id="userRole" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl outline-none">
                        <option value="USER">USER</option>
                        <option value="ADMIN">ADMIN</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-gray-400 uppercase mb-1">Баланс</label>
                    <input type="number" id="userBalance" class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 dark:text-white border border-gray-200 dark:border-gray-600 rounded-xl outline-none">
                </div>
            </div>
            <div class="flex gap-3 pt-6">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black">Сохранить</button>
                <button type="button" onclick="closeUserModal()" class="flex-1 bg-gray-100 dark:bg-gray-700 dark:text-gray-300 py-4 rounded-xl font-bold">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Logic for Theme
    function initTheme() {
        const isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.getElementById('htmlRoot').classList.add('dark');
            document.getElementById('themeBtnText').textContent = '☀️ Светлый режим';
        }
    }
    function toggleDarkMode() {
        const isDark = document.getElementById('htmlRoot').classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
        document.getElementById('themeBtnText').textContent = isDark ? '☀️ Светлый режим' : '🌙 Темный режим';
    }
    initTheme();

    // Переиспользуем твою логику загрузки, но с адаптацией стилей для строк
    const token = localStorage.getItem('token');
    const getHeaders = () => ({ 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' });

    async function loadUsers() {
        const res = await fetch('/api/admin/users', { headers: getHeaders() });
        const users = await res.json();
        document.getElementById('usersTableBody').innerHTML = users.map(user => `
            <tr class="hover:bg-blue-50/30 dark:hover:bg-blue-900/10 transition-colors group">
                <td class="px-6 py-4 text-xs font-mono text-gray-400">#${user.id}</td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center font-black">
                            ${user.fullName ? user.fullName[0] : '?'}
                        </div>
                        <div>
                            <p class="text-sm font-bold text-gray-900 dark:text-white">${user.fullName || 'Без имени'}</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">${user.email}</p>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-4">
                    <span class="px-3 py-1 text-[10px] font-black rounded-full border ${user.role === 'ADMIN' ? 'bg-purple-50 dark:bg-purple-900/20 text-purple-600 dark:text-purple-400 border-purple-100 dark:border-purple-800' : 'bg-gray-50 dark:bg-gray-700 text-gray-600 dark:text-gray-300 border-gray-100 dark:border-gray-600'}">
                        ${user.role}
                    </span>
                </td>
                <td class="px-6 py-4 text-sm font-black text-gray-700 dark:text-gray-200">${user.balance || 0} сом</td>
                <td class="px-6 py-4 text-right">
                    <button onclick="openUserModal(${user.id})" class="p-2 bg-blue-50 dark:bg-blue-900/30 text-blue-600 rounded-lg hover:bg-blue-600 hover:text-white transition">✏️</button>
                </td>
            </tr>
        `).join('');
    }
    loadUsers();
</script>
</body>
</html>
