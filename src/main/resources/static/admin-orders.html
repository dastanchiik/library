<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление заказами - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-black">📚 BookCloud</h1>
            <p class="text-gray-400 text-sm">Admin Panel</p>
        </div>

        <nav class="flex-1 p-6 space-y-2">
            <a href="admin-dashboard.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">📊 Dashboard</a>
            <a href="admin-users.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">👥 Пользователи</a>
            <a href="admin-books.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">📖 Книги</a>
            <a href="admin-orders.html" class="block px-4 py-3 bg-blue-600 rounded-lg font-semibold">📋 Заказы</a>
            <a href="admin-categories.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">🏷️ Категории</a>
        </nav>

        <div class="p-6 border-t border-gray-700 space-y-2">
            <a href="admin-profile.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">⚙️ Профиль</a>
            <button onclick="logout()" class="w-full px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg font-semibold">🚪 Выход</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col">
        <!-- Header -->
        <div class="bg-white shadow p-6 flex justify-between items-center">
            <h2 class="text-3xl font-bold text-gray-900">Управление заказами</h2>
            <div class="flex gap-2">
                <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Все статусы</option>
                    <option value="PENDING">Ожидание</option>
                    <option value="COMPLETED">Завершено</option>
                    <option value="CANCELLED">Отменено</option>
                </select>
            </div>
        </div>

        <!-- Content -->
        <div class="flex-1 overflow-auto p-6">
            <!-- Orders Table -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="w-full">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">ID</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Пользователь</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Сумма</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Статус</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Дата</th>
                            <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTable" class="divide-y divide-gray-200">
                        <tr class="hover:bg-gray-50">
                            <td colspan="6" class="px-6 py-4 text-center text-gray-500">Загрузка...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Order Details Modal -->
<div id="orderModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-2xl max-h-96 overflow-y-auto">
        <h3 class="text-2xl font-bold text-gray-900 mb-6" id="orderModalTitle">Детали заказа</h3>

        <div id="orderDetails" class="space-y-4 mb-6">
            <!-- Loaded dynamically -->
        </div>

        <div class="flex gap-3">
            <select id="statusSelect" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="PENDING">Ожидание</option>
                <option value="COMPLETED">Завершено</option>
                <option value="CANCELLED">Отменено</option>
            </select>
            <button onclick="updateOrderStatus()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold">
                Обновить статус
            </button>
            <button onclick="closeOrderModal()" class="bg-gray-300 text-gray-900 px-6 py-2 rounded-lg hover:bg-gray-400 font-semibold">
                Закрыть
            </button>
        </div>
    </div>
</div>

<script>
    let currentOrderId = null;

    function checkAuth() {
    const token = localStorage.getItem('token');
    if (!token) {
    window.location.href = 'admin-login.html';
}
}

    function logout() {
    localStorage.removeItem('token');
    localStorage.removeItem('isAdmin');
    window.location.href = 'welcome.html';
}

    async function loadOrders() {
    const token = localStorage.getItem('token');
    if (!token) return;

    try {
    const response = await fetch('/api/admin/orders', {
    headers: { 'Authorization': 'Bearer ' + token }
});

    if (response.status === 403) {
    window.location.href = 'admin-login.html';
    return;
}

    const orders = await response.json();
    if (!Array.isArray(orders)) return;

    const statusFilter = document.getElementById('statusFilter').value;
    const filtered = statusFilter ? orders.filter(o => o.status === statusFilter) : orders;

    const tbody = document.getElementById('ordersTable');

    const statusColors = {
    'PENDING': 'bg-yellow-100 text-yellow-800',
    'PAID': 'bg-blue-100 text-blue-800',
    'COMPLETED': 'bg-green-100 text-green-800',
    'CANCELLED': 'bg-red-100 text-red-800',
    'FAILED': 'bg-red-200 text-red-900',
    'NEW': 'bg-purple-100 text-purple-800'
};

    tbody.innerHTML = filtered.map(order => {
    const id = order.orderId;
    // ИСПРАВЛЕНИЕ: берем customerName, если email пустой
    const customer = order.customerName || order.userEmail || 'Аноним';
    const date = order.createdAt ? new Date(order.createdAt).toLocaleDateString('ru-RU') : '—';

    return `
                    <tr class="hover:bg-gray-50">
                        <td class="px-6 py-4 text-sm text-gray-900 font-semibold">#${id}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${customer}</td>
                        <td class="px-6 py-4 text-sm text-gray-900 font-bold">${order.totalPrice || order.price} сом</td>
                        <td class="px-6 py-4 text-sm">
                            <span class="px-3 py-1 rounded-full text-xs font-semibold ${statusColors[order.status] || 'bg-gray-100 text-gray-800'}">
                                ${order.status}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">${date}</td>
                        <td class="px-6 py-4 text-sm space-x-2">
                            <button onclick="viewOrder(${id})" class="text-blue-600 hover:underline">Просмотр</button>
                            <button onclick="deleteOrder(${id})" class="text-red-600 hover:underline">Удалить</button>
                        </td>
                    </tr>
                `;
}).join('') || '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Нет заказов</td></tr>';

} catch (error) {
    console.error('Ошибка:', error);
}
}

    async function viewOrder(orderId) {
        const token = localStorage.getItem('token');
        try {
            // ВАЖНО: путь должен совпадать с контроллером @GetMapping("get/one/order/{id}")
            const response = await fetch(`/api/admin/get/one/order/${orderId}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!response.ok) {
                // Если сервер вернул 404, значит путь /api/admin/orders/get/one/order/6 не существует
                throw new Error(`Ошибка ${response.status}: Проверь путь в контроллере или JS`);
            }

            const order = await response.json();
            currentOrderId = orderId;

            // Наполняем модалку
            document.getElementById('orderModalTitle').textContent = `Заказ #${order.orderId || order.id}`;
            document.getElementById('statusSelect').value = order.status;

            const details = `
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-sm text-gray-600">Клиент</p>
                    <p class="font-semibold text-gray-900">${order.customerName || order.userEmail || 'Dastan'}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600">Книга</p>
                    <p class="font-semibold text-gray-900">${order.bookTitle || 'Не указана'}</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600">Сумма</p>
                    <p class="font-semibold text-gray-900">${order.totalPrice || order.price} сом</p>
                </div>
                <div>
                    <p class="text-sm text-gray-600">Статус</p>
                    <p class="font-semibold text-gray-900">${order.status}</p>
                </div>
            </div>
        `;

            document.getElementById('orderDetails').innerHTML = details;
            document.getElementById('orderModal').classList.remove('hidden');

        } catch (error) {
            alert(error.message);
        }
    }

    async function updateOrderStatus() {
    const token = localStorage.getItem('token');
    const statusValue = document.getElementById('statusSelect').value;

    try {
    const response = await fetch(`/api/admin/orders/${currentOrderId}/status`, {
    method: 'PATCH',
    headers: {
    'Authorization': 'Bearer ' + token,
    'Content-Type': 'application/json'
},
    body: JSON.stringify({ status: statusValue })
});

    if (response.ok) {
    closeOrderModal();
    loadOrders();
} else {
    alert('Ошибка: сервер не смог обновить статус');
}
} catch (error) {
    alert('Ошибка связи с сервером');
}
}

    async function deleteOrder(orderId) {
    if (!confirm('Вы уверены?')) return;
    const token = localStorage.getItem('token');
    try {
    const response = await fetch(`/api/admin/orders/${orderId}`, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
});
    if(response.ok) loadOrders();
} catch (e) { console.error(e); }
}

    function closeOrderModal() {
    document.getElementById('orderModal').classList.add('hidden');
}

    document.getElementById('statusFilter').addEventListener('change', loadOrders);

    checkAuth();
    loadOrders();
</script>

</body>
</html>
