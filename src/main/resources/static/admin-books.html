<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление книгами - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">
    <div class="w-64 bg-gray-900 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-black italic">📚 BookCloud</h1>
            <p class="text-blue-400 text-xs font-bold tracking-widest uppercase mt-1">Admin Panel</p>
        </div>
        <nav class="flex-1 p-6 space-y-2">
            <a href="admin-dashboard.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📊 Dashboard</a>
            <a href="admin-users.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">👥 Пользователи</a>
            <a href="admin-books.html" class="block px-4 py-3 bg-blue-600 rounded-lg font-semibold shadow-lg shadow-blue-900/50">📖 Книги</a>
            <a href="admin-orders.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📋 Заказы</a>
            <a href="admin-categories.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">🏷️ Категории</a>
        </nav>
        <div class="p-6 border-t border-gray-700">
            <button onclick="logout()" class="w-full px-4 py-3 bg-red-600/20 text-red-400 hover:bg-red-600 hover:text-white rounded-lg font-bold transition duration-300">🚪 Выход</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="bg-white shadow-sm p-6 flex justify-between items-center border-b">
            <h2 class="text-3xl font-black text-gray-800">Книжный фонд</h2>
            <button onclick="openBookModal()" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 font-bold shadow-lg shadow-blue-200 transition-all active:scale-95">
                + Добавить книгу
            </button>
        </div>

        <div class="flex-1 overflow-auto p-8">
            <div class="relative mb-8">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">🔍</span>
                <input type="text" id="searchInput" placeholder="Поиск по названию, автору или ISBN..." class="w-full pl-10 pr-4 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            </div>

            <div id="booksGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <p class="text-gray-500 animate-pulse text-center col-span-full">Загрузка библиотеки...</p>
            </div>
        </div>
    </div>
</div>

<div id="bookModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg my-auto transform transition-all">
        <div class="flex justify-between items-center mb-6">
            <h3 id="modalTitle" class="text-2xl font-black text-gray-900">Добавить книгу</h3>
            <button onclick="closeBookModal()" class="text-gray-400 hover:text-gray-600 text-2xl">&times;</button>
        </div>

        <form id="bookForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Название книги</label>
                    <input type="text" id="title" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Автор</label>
                    <input type="text" id="author" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Категория</label>
                    <select id="bookCategory" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="">Выберите...</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Описание</label>
                <textarea id="description" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" rows="3"></textarea>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Цена (сом)</label>
                    <input type="number" id="price" step="0.01" min="0" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">На складе</label>
                    <input type="number" id="stock" min="0" required class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ISBN</label>
                    <input type="text" id="isbn" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="flex gap-3 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-4 rounded-xl hover:bg-blue-700 font-bold shadow-lg transition-all">Сохранить</button>
                <button type="button" onclick="closeBookModal()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-xl hover:bg-gray-200 font-bold transition-all">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    let currentBookId = null;
    const token = localStorage.getItem('token');

    function checkAuth() { if (!token) window.location.href = 'admin-login.html'; }
    function logout() { localStorage.clear(); window.location.href = 'admin-login.html'; }

    const getHeaders = () => ({
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
    });

    async function loadCategories() {
        try {
            const response = await fetch('/api/admin/categories', { headers: getHeaders() });
            if (!response.ok) throw new Error();
            const categories = await response.json();
            const select = document.getElementById('bookCategory');
            select.innerHTML = '<option value="">Выберите категорию</option>';
            categories.forEach(cat => {
                select.innerHTML += `<option value="${cat}">${cat}</option>`;
            });
        } catch (e) {
            document.getElementById('bookCategory').innerHTML = '<option value="">Ошибка загрузки (Enum)</option>';
        }
    }

    async function loadBooks() {
        const grid = document.getElementById('booksGrid');
        try {
            const response = await fetch('/api/admin/books', { headers: getHeaders() });
            if (response.status === 401 || response.status === 403) logout();

            const books = await response.json();

            // Если сервер вернул ошибку 500, 'books' не будет массивом
            if (!Array.isArray(books)) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-500 font-bold">Ошибка сервера (500). Проверьте NullPointerException в Java.</div>`;
                return;
            }

            grid.innerHTML = books.map(book => `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all duration-300 group">
                    <div class="h-40 bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-6xl group-hover:scale-110 transition-transform duration-500">📖</div>
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-black uppercase bg-blue-100 text-blue-700 px-2 py-1 rounded-md">${book.category || 'Без категории'}</span>
                            <span class="text-xs text-gray-400">ID: ${book.id}</span>
                        </div>
                        <h4 class="font-black text-gray-900 text-xl mb-1 line-clamp-1">${book.title}</h4>
                        <p class="text-gray-500 text-sm mb-4">${book.author}</p>
                        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl mb-6">
                            <div>
                                <p class="text-[10px] text-gray-400 uppercase font-bold">Цена</p>
                                <p class="text-lg font-black text-blue-600">${book.price} сом</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-gray-400 uppercase font-bold">Склад</p>
                                <p class="text-lg font-black ${book.stock > 0 ? 'text-gray-900' : 'text-red-500'}">${book.stock} шт.</p>
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editBook(${book.id})" class="flex-1 bg-gray-900 text-white py-3 rounded-xl hover:bg-black font-bold text-sm transition-all active:scale-95">Изменить</button>
                            <button onclick="deleteBook(${book.id})" class="p-3 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all duration-300">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('') || '<div class="col-span-full text-center py-20 text-gray-400">Книги не найдены.</div>';
        } catch (error) {
            grid.innerHTML = '<p class="col-span-full text-center text-red-500">Критическая ошибка сети.</p>';
        }
    }

    function openBookModal() {
        currentBookId = null;
        document.getElementById('modalTitle').textContent = 'Новая книга';
        document.getElementById('bookForm').reset();
        loadCategories();
        document.getElementById('bookModal').classList.remove('hidden');
    }

    function closeBookModal() { document.getElementById('bookModal').classList.add('hidden'); }

    async function editBook(bookId) {
        try {
            await loadCategories();
            const response = await fetch(`/api/admin/books/${bookId}`, { headers: getHeaders() });
            const book = await response.json();
            currentBookId = bookId;
            document.getElementById('modalTitle').textContent = 'Редактирование';
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('description').value = book.description || '';
            document.getElementById('price').value = book.price;
            document.getElementById('stock').value = book.stock;
            document.getElementById('isbn').value = book.isbn || '';
            document.getElementById('bookCategory').value = book.category || '';
            document.getElementById('bookModal').classList.remove('hidden');
        } catch (e) { alert('Ошибка загрузки книги'); }
    }

    async function deleteBook(bookId) {
        if (!confirm('Удалить?')) return;
        const res = await fetch(`/api/admin/books/${bookId}`, { method: 'DELETE', headers: getHeaders() });
        if (res.ok) loadBooks();
    }

    document.getElementById('bookForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const bookData = {
            title: document.getElementById('title').value,
            author: document.getElementById('author').value,
            category: document.getElementById('bookCategory').value, // Отправляем СТРОКУ для Enum
            description: document.getElementById('description').value,
            price: parseFloat(document.getElementById('price').value),
            stock: parseInt(document.getElementById('stock').value),
            isbn: document.getElementById('isbn').value
        };

        const method = currentBookId ? 'PUT' : 'POST';
        const url = currentBookId ? `/api/admin/books/${currentBookId}` : '/api/admin/books';

        const response = await fetch(url, {
            method,
            headers: getHeaders(),
            body: JSON.stringify(bookData)
        });

        if (response.ok) { closeBookModal(); loadBooks(); }
        else { alert('Ошибка сохранения. Проверьте логи сервера.'); }
    });

    document.getElementById('searchInput').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('#booksGrid > div').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? '' : 'none';
        });
    });

    checkAuth();
    loadBooks();
    loadCategories();
</script>
</body>
</html>
