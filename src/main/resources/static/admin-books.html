<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление книгами - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="theme.js"></script>
    <script>
        applyTheme();
    </script>
</head>
<body class="bg-[#111827] text-gray-100 transition-colors duration-200 min-h-screen">
<div class="flex h-screen overflow-hidden">

    <div class="w-64 bg-[#1f293d] flex flex-col justify-between p-6 shadow-xl border-r border-gray-800">
        <div>
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                    📚 BookCloud
                </h1>
                <p class="text-xs text-gray-400 mt-1">Admin Panel</p>
            </div>
            <nav class="space-y-2">
                <a href="admin-dashboard.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 text-gray-400 hover:bg-gray-800 hover:text-white">
                    📊 <span>Dashboard</span>
                </a>
                <a href="admin-profile.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 text-gray-400 hover:bg-gray-800 hover:text-white">
                    👤 <span>Мой профиль</span>
                </a>
                <a href="admin-users.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 text-gray-400 hover:bg-gray-800 hover:text-white">
                    👥 <span>Пользователи</span>
                </a>
                <a href="admin-books.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 bg-blue-600 text-white shadow-lg shadow-blue-600/30">
                    📖 <span>Книги</span>
                </a>
                <a href="admin-orders.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 text-gray-400 hover:bg-gray-800 hover:text-white">
                    📜 <span>Заказы</span>
                </a>
                <a href="admin-categories.html" class="flex items-center gap-3 py-3 px-4 rounded-lg transition duration-200 text-gray-400 hover:bg-gray-800 hover:text-white">
                    🏷️ <span>Категории</span>
                </a>
            </nav>
        </div>

        <div class="space-y-3">
            <a href="index.html" class="w-full flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg bg-gray-800 hover:bg-gray-700 text-sm font-medium transition text-center text-gray-200">
                🌐 На сайт
            </a>
            <button onclick="window.safeLogout()" class="w-full flex items-center justify-center gap-2 py-3 px-4 rounded-lg bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white text-sm font-bold transition">
                🚪 Выход
            </button>
        </div>
    </div>

    <div class="flex-1 overflow-auto p-10 bg-[#111827]">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-bold text-white">Управление книгами</h2>
            <div class="flex gap-4 items-center">
                <button onclick="window.toggleTheme()" class="p-2.5 rounded-lg bg-gray-800 hover:bg-gray-700 transition-colors border border-gray-700">
                    <span id="themeIcon">🌙</span>
                </button>
                <button onclick="showAddModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg hover:bg-blue-700 transition font-medium shadow-lg shadow-blue-600/20">
                    Добавить книгу
                </button>
            </div>
        </div>

        <form onsubmit="event.preventDefault(); searchBooks();" class="bg-[#1f293d] p-4 rounded-xl border border-gray-800 mb-6 flex gap-4">
            <input type="text" id="searchInput" placeholder="Поиск по названию..."
                   class="flex-1 bg-[#111827] border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-500">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                Найти
            </button>
        </form>

        <div id="booksGrid" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
        </div>
    </div>
</div>

<div id="modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center p-4 z-50">
    <div class="bg-[#1f293d] border border-gray-800 rounded-xl p-8 max-w-2xl w-full shadow-2xl">
        <h3 id="modalTitle" class="text-2xl font-bold mb-6 text-white">Редактировать книгу</h3>
        <form id="bookForm" class="grid grid-cols-2 gap-4">
            <input type="hidden" id="bookId">

            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-400 mb-1">Название</label>
                <input type="text" id="title" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Автор</label>
                <input type="text" id="author" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Категория</label>
                <select id="category" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Цена (сом)</label>
                <input type="number" step="0.01" id="price" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Склад</label>
                <input type="number" id="stock" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-400 mb-1">Обложка книги</label>
                <input type="hidden" id="imageURL" required>
                <div class="flex items-center gap-4 bg-[#111827] p-3 border border-gray-700 rounded-lg">
                    <div class="w-16 h-20 bg-gray-800 rounded overflow-hidden flex-shrink-0 border border-gray-700 flex items-center justify-center text-xs text-gray-500">
                        <img id="modalImagePreview" src="" class="w-full h-full object-cover hidden">
                        <span id="modalImagePlaceholder">Нет фото</span>
                    </div>
                    <div class="flex-1">
                        <input type="file" id="imageFileInput" accept="image/*" class="hidden" onchange="uploadFile(this)">
                        <button type="button" onclick="document.getElementById('imageFileInput').click()" class="bg-gray-800 hover:bg-gray-700 text-gray-200 border border-gray-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                            Выбрать изображение...
                        </button>
                        <p id="uploadStatus" class="text-xs text-gray-500 mt-1">Файл не выбран</p>
                    </div>
                </div>
            </div>

            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-400 mb-1">Описание</label>
                <textarea id="description" rows="3" required class="w-full bg-[#111827] border border-gray-700 rounded-lg px-3 py-2 text-white focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>
            <div class="col-span-2 flex justify-end gap-3 mt-4">
                <button type="button" onclick="hideModal()" class="px-6 py-2 border border-gray-700 rounded-lg text-gray-300 hover:bg-gray-800 transition">Отмена</button>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'admin-login.html';

    let currentBooks = [];

    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function getImageUrl(url) {
        if (!url) return 'https://via.placeholder.com/128x176?text=Нет+фото';
        if (url.startsWith('/')) {
            return window.location.origin + url;
        }
        return url;
    }

    // Асинхронная загрузка файла на сервер при выборе
    async function uploadFile(input) {
        const file = input.files[0];
        if (!file) return;

        const statusText = document.getElementById('uploadStatus');
        statusText.innerText = 'Загрузка...';
        statusText.className = 'text-xs text-blue-400 mt-1';

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/api/admin/books/upload-image', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });

            if (response.ok) {
                const data = await response.json();

                // Записываем полученный URL в скрытое поле
                document.getElementById('imageURL').value = data.imageURL;

                // Обновляем превью в модальном окне
                const previewImg = document.getElementById('modalImagePreview');
                previewImg.src = getImageUrl(data.imageURL);
                previewImg.classList.remove('hidden');
                document.getElementById('modalImagePlaceholder').classList.add('hidden');

                statusText.innerText = 'Успешно загружено!';
                statusText.className = 'text-xs text-emerald-400 mt-1';
            } else {
                statusText.innerText = 'Ошибка при загрузке файла';
                statusText.className = 'text-xs text-red-400 mt-1';
            }
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            statusText.innerText = 'Ошибка соединения с сервером';
            statusText.className = 'text-xs text-red-400 mt-1';
        }
    }

    async function loadBooks() {
        try {
            const response = await fetch('/api/admin/books', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            currentBooks = await response.json();
            renderCards(currentBooks);
        } catch (error) {
            console.error('Ошибка загрузки книг:', error);
        }
    }

    async function searchBooks() {
        const query = document.getElementById('searchInput').value.trim();
        if (!query) {
            loadBooks();
            return;
        }

        try {
            const response = await fetch(`/api/admin/search/book/title?title=${encodeURIComponent(query)}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                currentBooks = await response.json();
                renderCards(currentBooks);
            } else {
                currentBooks = [];
                renderCards([]);
            }
        } catch (error) {
            console.error('Ошибка поиска:', error);
            currentBooks = [];
            renderCards([]);
        }
    }

    async function loadCategories() {
        try {
            const response = await fetch('/api/admin/categories', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const categories = await response.json();
            const select = document.getElementById('category');
            select.innerHTML = categories.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
        } catch (error) {
            console.error('Ошибка загрузки категорий:', error);
        }
    }

    function renderCards(books) {
        const grid = document.getElementById('booksGrid');
        if (!books || books.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-8 text-center text-gray-500">Книги не найдены</div>`;
            return;
        }

        grid.innerHTML = books.map(book => `
            <div class="bg-[#1f293d] border border-gray-800 rounded-xl p-5 flex gap-5 hover:border-gray-700 transition shadow-lg">
                <div class="w-32 h-44 flex-shrink-0 bg-gray-900 rounded-lg overflow-hidden border border-gray-700 shadow-md">
                    <img src="${getImageUrl(book.imageURL)}" alt="${escapeHtml(book.title)}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/128x176?text=Ошибка+фото'">
                </div>

                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start gap-2">
                            <h4 class="text-xl font-bold text-white line-clamp-1">${escapeHtml(book.title)}</h4>
                            <span class="text-xs text-gray-500 font-mono">#${escapeHtml(book.id)}</span>
                        </div>
                        <p class="text-sm text-gray-400 mt-0.5">Автор: <span class="text-gray-300">${escapeHtml(book.author)}</span></p>
                        <p class="text-xs text-gray-400 mt-1">Категория: <span class="text-blue-400 font-medium">${escapeHtml(book.category)}</span></p>

                        <div class="grid grid-cols-3 gap-2 mt-4 bg-[#111827]/60 p-3 rounded-lg text-center border border-gray-800/50">
                            <div>
                                <span class="block text-[10px] uppercase tracking-wider text-gray-500">Цена</span>
                                <span class="text-sm font-bold text-emerald-400">${escapeHtml(book.price)} сом</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase tracking-wider text-gray-500">Склад</span>
                                <span class="text-sm font-semibold text-gray-200">${escapeHtml(book.stock)}</span>
                            </div>
                            <div>
                                <span class="block text-[10px] uppercase tracking-wider text-gray-500">Продажи</span>
                                <span class="text-sm font-semibold text-gray-200">${escapeHtml(book.salesCount || 0)}</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex justify-end gap-3 mt-4">
                        <button onclick="editBookById(${book.id})" class="px-4 py-1.5 bg-gray-800 hover:bg-gray-700 text-blue-400 hover:text-blue-300 rounded-lg text-sm font-medium transition border border-gray-700">
                            Изменить
                        </button>
                        <button onclick="deleteBook(${book.id})" class="px-4 py-1.5 bg-red-600/10 hover:bg-red-600 text-red-400 hover:text-white rounded-lg text-sm font-medium transition border border-red-500/20">
                            Удалить
                        </button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function showAddModal() {
        document.getElementById('modalTitle').innerText = 'Добавить книгу';
        document.getElementById('bookForm').reset();
        document.getElementById('bookId').value = '';
        document.getElementById('imageURL').value = '';

        // Сброс превью
        document.getElementById('modalImagePreview').classList.add('hidden');
        document.getElementById('modalImagePlaceholder').classList.remove('hidden');
        document.getElementById('uploadStatus').innerText = 'Файл не выбран';
        document.getElementById('uploadStatus').className = 'text-xs text-gray-500 mt-1';

        document.getElementById('modal').classList.remove('hidden');
    }

    function hideModal() {
        document.getElementById('modal').classList.add('hidden');
    }

    function editBookById(id) {
        const book = currentBooks.find(b => b.id === id);
        if (!book) return;

        document.getElementById('modalTitle').innerText = 'Редактировать книгу';
        document.getElementById('bookId').value = book.id;
        document.getElementById('title').value = book.title;
        document.getElementById('author').value = book.author;
        document.getElementById('category').value = book.category;
        document.getElementById('price').value = book.price;
        document.getElementById('stock').value = book.stock;
        document.getElementById('description').value = book.description || '';

        // Установка старого фото в превью модалки
        const imgUrl = book.imageURL || '';
        document.getElementById('imageURL').value = imgUrl;

        const previewImg = document.getElementById('modalImagePreview');
        if (imgUrl) {
            previewImg.src = getImageUrl(imgUrl);
            previewImg.classList.remove('hidden');
            document.getElementById('modalImagePlaceholder').classList.add('hidden');
            document.getElementById('uploadStatus').innerText = 'Текущее изображение';
            document.getElementById('uploadStatus').className = 'text-xs text-gray-400 mt-1';
        } else {
            previewImg.classList.add('hidden');
            document.getElementById('modalImagePlaceholder').classList.remove('hidden');
            document.getElementById('uploadStatus').innerText = 'Файл не выбран';
        }

        document.getElementById('modal').classList.remove('hidden');
    }

    document.getElementById('bookForm').onsubmit = async (e) => {
        e.preventDefault();
        const id = document.getElementById('bookId').value;

        const bookData = {
            title: document.getElementById('title').value.trim(),
            author: document.getElementById('author').value.trim(),
            category: document.getElementById('category').value,
            price: Number(document.getElementById('price').value),
            stock: parseInt(document.getElementById('stock').value, 10),
            imageURL: document.getElementById('imageURL').value.trim(),
            description: document.getElementById('description').value.trim()
        };

        const url = id ? `/api/admin/books/${id}` : '/api/admin/books';
        const method = id ? 'PUT' : 'POST';

        try {
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(bookData)
            });

            if (response.ok) {
                hideModal();
                loadBooks();
            } else {
                alert('Ошибка при сохранении книги');
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    };

    async function deleteBook(id) {
        if (!confirm('Вы уверены, что хотите удалить эту книгу?')) return;
        try {
            const response = await fetch(`/api/admin/books/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (response.ok) {
                loadBooks();
            } else {
                alert('Ошибка при удалении книги');
            }
        } catch (error) {
            console.error('Ошибка при удалении:', error);
        }
    }

    window.onload = () => {
        if (typeof initThemeIcon === 'function') initThemeIcon();
        loadBooks();
        loadCategories();
    };
</script>
</body>
</html>
