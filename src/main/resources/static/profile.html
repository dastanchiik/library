<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — BookCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<nav class="bg-white border-b border-gray-200 p-4 sticky top-0 z-50">
    <div class="container mx-auto flex items-center gap-4">
        <button onclick="location.href='index.html'" class="p-2 hover:bg-gray-100 rounded-full transition text-gray-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>
        <h1 class="text-xl font-bold text-gray-800">Личный кабинет</h1>
    </div>
</nav>

<div class="container mx-auto py-12 px-4 max-w-4xl">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <div class="md:col-span-1">
            <div class="bg-white p-8 rounded-3xl shadow-xl border border-gray-100 flex flex-col items-center text-center">
                <div class="w-32 h-32 bg-gradient-to-tr from-blue-600 to-blue-400 text-white rounded-full flex items-center justify-center text-5xl font-black shadow-inner mb-6">
                    <span id="initials">?</span>
                </div>
                <h2 id="prof-name" class="text-2xl font-bold text-gray-800 mb-1">Загрузка...</h2>
                <p id="prof-email" class="text-gray-400 text-sm mb-4"></p>
                <span id="prof-rank" class="inline-block bg-orange-100 text-orange-600 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-sm border border-orange-200">НОВИЧОК</span>
            </div>
        </div>

        <div class="md:col-span-2 grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Баланс</p>
                <p id="prof-balance" class="text-3xl font-black text-green-600">0 сом</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Дней с нами</p>
                <p id="prof-days" class="text-3xl font-black text-blue-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Куплено книг</p>
                <p id="prof-count" class="text-3xl font-black text-purple-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-gray-400 text-xs uppercase font-bold mb-2">Любимый жанр</p>
                <p id="prof-genre" class="text-xl font-black text-gray-700 truncate">Нужно больше книг</p>
            </div>

            <div class="col-span-2 mt-4">
                <button onclick="location.href='topup.html'" class="w-full bg-gray-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition shadow-lg">
                    Пополнить баланс
                </button>
            </div>
        </div>

    </div>
</div>
<div class="mt-10 pt-6 border-t border-gray-100">
    <button onclick="logout()" class="w-full flex items-center justify-center gap-3 bg-red-50 text-red-600 py-4 rounded-2xl font-bold hover:bg-red-100 transition-colors group">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Выйти из аккаунта
    </button>
</div>
<script>
    function logout() {
        if (confirm("Вы точно хотите выйти из системы?")) {
            // Стираем данные из памяти браузера
            localStorage.clear();

            // Редирект на вход
            window.location.href = 'welcome.html';
        }
    }
    const USER_ID = localStorage.getItem('userId');
    const token = localStorage.getItem('token');

    if (!USER_ID || !token) {
        location.href = 'welcome.html';
    }

    async function fetchProfile() {
        try {
            const res = await fetch(`/api/user/profile?id=${USER_ID}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            if (!res.ok) throw new Error("Ошибка сервера");

            const user = await res.json();

            // Имя и Инициал
            document.getElementById('prof-name').innerText = user.fullName || "Пользователь";
            document.getElementById('initials').innerText = user.fullName ? user.fullName.charAt(0) : "?";

            // Email (Берем из ответа бэкенда)
            const emailElem = document.getElementById('prof-email');
            if (user.email) {
                emailElem.innerText = user.email;
            } else {
                emailElem.innerText = "Email не указан";
            }

            // Баланс и Статистика
            document.getElementById('prof-balance').innerText = `${user.balance} сом`;
            document.getElementById('prof-count').innerText = user.totalBooks;
            document.getElementById('prof-days').innerText = user.daysWithUs;

            // Ранг
            document.getElementById('prof-rank').innerText = user.rank || "Странник";

            // Жанр (Твоя логика: если книг мало, пишем "Нужно больше книг")
            const genreElem = document.getElementById('prof-genre');
            if (user.totalBooks === 0 || user.favouriteGenre === "Ещё не определен") {
                genreElem.innerText = "Нужно купить больше книг";
                genreElem.classList.add('text-sm', 'text-gray-400'); // Делаем текст чуть скромнее
            } else {
                genreElem.innerText = user.favouriteGenre;
                genreElem.classList.remove('text-sm', 'text-gray-400');
            }

        } catch (err) {
            console.error("Ошибка:", err);
        }
    }

    fetchProfile();
</script>
</body>
</html>
