<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление категориями - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<div class="flex h-screen">
    <div class="w-64 bg-gray-900 text-white flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-black">📚 BookCloud</h1>
            <p class="text-gray-400 text-sm">Admin Panel</p>
        </div>

        <nav class="flex-1 p-6 space-y-2">
            <a href="admin-dashboard.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">📊 Dashboard</a>
            <a href="admin-users.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">👥 Пользователи</a>
            <a href="admin-books.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">📖 Книги</a>
            <a href="admin-orders.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">📋 Заказы</a>
            <a href="admin-categories.html" class="block px-4 py-3 bg-blue-600 rounded-lg font-semibold">🏷️ Категории</a>
        </nav>

        <div class="p-6 border-t border-gray-700 space-y-2">
            <a href="admin-profile.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg">⚙️ Профиль</a>
            <button onclick="logout()" class="w-full px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg font-semibold">🚪 Выход</button>
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        <div class="bg-white shadow p-6 flex justify-between items-center">
            <h2 class="text-3xl font-bold text-gray-900">Управление категориями</h2>
            <button onclick="openCategoryModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 font-semibold">
                + Добавить категорию
            </button>
        </div>

        <div class="flex-1 overflow-auto p-6">
            <div id="categoriesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-500 italic">Загрузка категорий...</p>
            </div>
        </div>
    </div>
</div>

<div id="categoryModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
        <h3 id="modalTitle" class="text-2xl font-bold text-gray-900 mb-6">Добавить категорию</h3>
        <form id="categoryForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Название</label>
                <input type="text" id="categoryName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div class="flex gap-3 mt-6">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-bold">Сохранить</button>
                <button type="button" onclick="closeCategoryModal()" class="flex-1 bg-gray-200 text-gray-800 py-2 rounded-lg hover:bg-gray-300 font-bold">Отмена</button>
            </div>
        </form>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    function checkAuth() {
        if (!token) window.location.href = 'admin-login.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'admin-login.html';
    }

    // Вспомогательная функция для заголовков
    const getHeaders = () => ({
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json'
    });

    async function loadCategories() {
        try {
            // В твоем случае категории вычисляются из списка книг админ-апи
            const response = await fetch('/api/admin/books', {
                headers: getHeaders()
            });

            if (response.status === 401 || response.status === 403) logout();

            const books = await response.json();

            // Группировка
            const catMap = {};
            books.forEach(book => {
                const c = book.category || "Без категории";
                catMap[c] = (catMap[c] || 0) + 1;
            });

            const grid = document.getElementById('categoriesGrid');
            const categories = Object.entries(catMap);

            if (categories.length === 0) {
                grid.innerHTML = '<p class="text-gray-500">Категории не найдены</p>';
                return;
            }

            grid.innerHTML = categories.map(([name, count]) => `
                <div class="bg-white rounded-xl shadow-md p-6 border border-gray-100 hover:shadow-lg transition">
                    <div class="flex justify-between items-start mb-4">
                        <div class="bg-blue-100 p-3 rounded-lg text-2xl">🏷️</div>
                        <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2 py-1 rounded">ID: ${name}</span>
                    </div>
                    <h4 class="font-bold text-xl text-gray-900 mb-1">${name}</h4>
                    <p class="text-gray-500 text-sm mb-4">Книг в системе: <span class="text-blue-600 font-bold">${count}</span></p>
                    <div class="flex gap-2 border-t pt-4">
                        <button onclick="editCategory('${name}')" class="text-blue-600 hover:bg-blue-50 px-3 py-1 rounded text-sm font-semibold">Изменить</button>
                        <button onclick="deleteCategory('${name}')" class="text-red-600 hover:bg-red-50 px-3 py-1 rounded text-sm font-semibold ml-auto">Удалить</button>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            console.error('Ошибка:', error);
        }
    }

    function openCategoryModal() {
        document.getElementById('categoryForm').reset();
        document.getElementById('modalTitle').textContent = 'Добавить категорию';
        document.getElementById('categoryModal').classList.remove('hidden');
    }

    function closeCategoryModal() {
        document.getElementById('categoryModal').classList.add('hidden');
    }

    // ВАЖНО: Так как категории — это просто строки в книге,
    // "Добавление" категории происходит через добавление книги с новой строкой.
    // Если нужно именно переименование, мы должны пройтись по книгам.

    document.getElementById('categoryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const newName = document.getElementById('categoryName').value;
        alert('Категория "' + newName + '" будет доступна при создании/редактировании книг.');
        closeCategoryModal();
    });

    async function deleteCategory(name) {
        if(!confirm(`Удалить категорию "${name}"? Книги останутся, но категория сбросится.`)) return;
        alert('Для удаления категории измените её у соответствующих книг в разделе "Книги".');
    }

    checkAuth();
    loadCategories();
</script>
</body>
</html>
