<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категории - BookCloud Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 transition-colors duration-300">

<div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 dark:bg-gray-950 text-white flex flex-col">
        <div class="p-6 border-b border-gray-700">
            <h1 class="text-2xl font-black">📚 BookCloud</h1>
            <p class="text-gray-400 text-sm">Admin Panel</p>
        </div>
        <nav class="flex-1 p-6 space-y-2">
            <a href="admin-dashboard.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📊 Dashboard</a>
            <a href="admin-profile.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">👤 Мой профиль</a>
            <div class="my-4 border-t border-gray-800"></div>
            <a href="admin-users.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">👥 Пользователи</a>
            <a href="admin-books.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📖 Книги</a>
            <a href="admin-orders.html" class="block px-4 py-3 text-gray-300 hover:bg-gray-800 rounded-lg transition">📋 Заказы</a>
            <a href="admin-categories.html" class="block px-4 py-3 bg-blue-600 text-white rounded-lg transition">🏷️ Категории</a>
        </nav>
        <div class="p-6 border-t border-gray-700 space-y-2">
            <button onclick="toggleDarkMode()" class="w-full px-4 py-2 bg-gray-800 text-gray-300 rounded-lg text-sm border border-gray-700 hover:bg-gray-700 transition">
                <span id="themeBtnText">🌙 Темный режим</span>
            </button>
            <button onclick="logout()" class="w-full px-4 py-3 bg-red-600 hover:bg-red-700 rounded-lg font-semibold transition">🚪 Выход</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <div class="bg-white dark:bg-gray-800 shadow-sm p-6 flex justify-between items-center border-b dark:border-gray-700">
            <div>
                <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Категории книг</h2>
                <p class="text-gray-500 dark:text-gray-400 text-sm">Управление жанрами библиотеки</p>
            </div>
            <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
        </div>

        <div class="flex-1 overflow-auto p-8" id="categoriesGrid">
            <!-- Categories will be here -->
        </div>
    </div>
</div>

<script>
    function initTheme() {
        if (localStorage.getItem('darkMode') === 'true') {
            document.getElementById('htmlRoot').classList.add('dark');
            document.getElementById('themeBtnText').textContent = '☀️ Светлый режим';
        }
    }
    initTheme();

    function toggleDarkMode() {
        const isDark = document.getElementById('htmlRoot').classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
        document.getElementById('themeBtnText').textContent = isDark ? '☀️ Светлый режим' : '🌙 Темный режим';
    }

    function logout() { localStorage.clear(); window.location.replace('admin-login.html'); }

    const categories = [
        { name: 'ФАНТАСТИКА', icon: '🚀', color: 'from-blue-500 to-indigo-600' },
        { name: 'ДЕТЕКТИВ', icon: '🔍', color: 'from-gray-700 to-gray-900' },
        { name: 'РОМАН', icon: '❤️', color: 'from-pink-500 to-rose-600' },
        { name: 'УЖАСЫ', icon: '👻', color: 'from-red-600 to-black' },
        { name: 'КЛАССИКА', icon: '📜', color: 'from-amber-600 to-orange-700' },
        { name: 'ПСИХОЛОГИЯ', icon: '🧠', color: 'from-teal-500 to-emerald-600' },
        { name: 'БИЗНЕС', icon: '💼', color: 'from-indigo-600 to-blue-700' },
        { name: 'ПРОГРАММИРОВАНИЕ', icon: '💻', color: 'from-cyan-500 to-blue-500' }
    ];

    function renderCategories() {
        const grid = document.getElementById('categoriesGrid');
        grid.innerHTML = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                ${categories.map(cat => `
                    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-300 overflow-hidden group">
                        <div class="h-32 bg-gradient-to-br ${cat.color} flex items-center justify-center text-5xl">
                            ${cat.icon}
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-black text-gray-900 dark:text-white mb-2">${cat.name}</h3>
                            <p class="text-gray-500 dark:text-gray-400 text-sm mb-6">Просмотр и управление книгами в разделе "${cat.name.toLowerCase()}".</p>
                            
                            <a href="admin-books.html?category=${encodeURIComponent(cat.name)}" class="flex items-center justify-between p-4 rounded-xl bg-gray-50 dark:bg-gray-700 hover:bg-blue-600 hover:text-white transition-all font-bold">
                                <span>Перейти к книгам</span>
                                <span>→</span>
                            </a>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    window.addEventListener('DOMContentLoaded', renderCategories);
</script>
</body>
</html>
