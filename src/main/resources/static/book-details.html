<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали книги - BookCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600 cursor-pointer" onclick="window.location.href='index.html'">📚 BookCloud</h1>
            <div id="userInfo" class="flex items-center gap-3">
                <div class="text-right">
                    <p id="usernameDisplay" class="text-sm font-bold"></p>
                    <p id="balanceDisplay" class="text-xs text-blue-600 font-bold"></p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <button onclick="history.back()" class="mb-8 text-blue-600 font-bold flex items-center gap-2 hover:translate-x-[-4px] transition-transform">
            ← Назад к каталогу
        </button>

        <div id="bookContent" class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
            <!-- Сюда загрузится контент -->
            <div class="p-20 w-full flex justify-center">
                <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-600"></div>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const bookId = params.get('id');

        async function init() {
            if (!bookId) {
                window.location.href = 'index.html';
                return;
            }
            fetchProfile();
            fetchBookDetails();
        }

        async function fetchProfile() {
            const token = localStorage.getItem('token');
            if (!token) return;
            try {
                const response = await fetch('/api/user/profile', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('usernameDisplay').textContent = user.username;
                    document.getElementById('balanceDisplay').textContent = `${user.balance} сом`;
                }
            } catch (error) {}
        }

        async function fetchBookDetails() {
            try {
                const response = await fetch(`/api/books/${bookId}`);
                if (!response.ok) throw new Error();
                const book = await response.json();
                renderDetails(book);
            } catch (error) {
                document.getElementById('bookContent').innerHTML = '<p class="p-10 text-center text-red-500">Книга не найдена</p>';
            }
        }

        function renderDetails(book) {
            const container = document.getElementById('bookContent');
            container.innerHTML = `
                <div class="md:w-1/2 bg-gray-100 flex items-center justify-center p-8">
                    <img src="${book.imageURL || 'https://via.placeholder.com/400x600?text=Нет+фото'}" 
                         class="max-h-[500px] rounded-2xl shadow-2xl object-contain bg-white" 
                         alt="${book.title}"
                         onerror="this.src='https://via.placeholder.com/400x600?text=Ошибка+загрузки'">
                </div>
                <div class="md:w-1/2 p-8 md:p-12 flex flex-col">
                    <div class="mb-6">
                        <span class="inline-block px-4 py-1 bg-blue-100 text-blue-600 rounded-full text-xs font-black uppercase tracking-widest mb-4">
                            ${book.category}
                        </span>
                        <h2 class="text-4xl font-black text-gray-900 mb-2 leading-tight">${book.title}</h2>
                        <p class="text-xl text-gray-400 font-medium">Автор: ${book.author}</p>
                    </div>

                    <div class="bg-gray-50 rounded-2xl p-6 mb-8 border border-gray-100">
                        <p class="text-gray-600 leading-relaxed italic">
                            "${book.description || 'Описание отсутствует...'}"
                        </p>
                    </div>

                    <div class="mt-auto pt-8 border-t flex items-center justify-between">
                        <div>
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Стоимость</p>
                            <p class="text-4xl font-black text-blue-600">${book.price} сом</p>
                        </div>
                        <button onclick="buyBook(${book.id}, ${book.price})" 
                                class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-5 rounded-2xl font-black text-lg transition shadow-2xl shadow-blue-300 transform hover:scale-105 active:scale-95">
                            Купить сейчас
                        </button>
                    </div>
                </div>
            `;
        }

        async function buyBook(id, price) {
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Пожалуйста, войдите в систему для покупки!');
                window.location.href = 'login.html';
                return;
            }

            if (!confirm(`Вы действительно хотите приобрести книгу "${document.querySelector('h2').textContent}" за ${price} сом?`)) return;

            try {
                const response = await fetch('/api/orders/buy', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ bookId: id })
                });

                if (response.ok) {
                    alert('Успешно! Книга добавлена в вашу библиотеку.');
                    fetchProfile();
                } else {
                    const data = await response.json();
                    alert(`Ошибка: ${data.message || 'Недостаточно средств или ошибка сервера'}`);
                }
            } catch (error) {
                alert('Произошла ошибка при покупке');
            }
        }

        init();
    </script>
</body>
</html>
