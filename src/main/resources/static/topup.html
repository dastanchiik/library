<!DOCTYPE html>
<html lang="ru" id="htmlRoot">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пополнение — BookCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <style>
        .bank-card.active { border-color: #2563eb; background-color: #eff6ff; }
        .dark .bank-card.active { background-color: #1e3a8a; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-900 font-sans transition-colors duration-300">

<nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 p-4 mb-6">
    <div class="container mx-auto flex items-center gap-4">
        <button onclick="location.href='profile.html'" class="p-2 hover:bg-gray-100 rounded-full transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
        </button>
        <h1 class="text-xl font-bold text-slate-800 dark:text-white">Пополнение баланса</h1>
        <button onclick="toggleDarkMode()" class="ml-auto px-3 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white rounded-lg font-semibold hover:bg-gray-300 dark:hover:bg-gray-600 transition" id="themeBtnTopup">🌙</button>
    </div>
</nav>

<main class="container mx-auto px-4 max-w-lg">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">

        <h2 class="text-lg font-bold text-slate-700 mb-6">Выберите способ оплаты</h2>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div onclick="selectBank(this, 'MBANK')" class="bank-card border-2 border-slate-100 rounded-2xl p-4 flex flex-col items-center cursor-pointer hover:border-blue-300 transition">
                <div class="w-12 h-12 bg-red-600 rounded-xl mb-2 flex items-center justify-center text-white font-black italic">M</div>
                <span class="text-xs font-bold text-slate-600 tracking-tight">MBANK</span>
            </div>
            <div onclick="selectBank(this, 'Компаньон')" class="bank-card border-2 border-slate-100 rounded-2xl p-4 flex flex-col items-center cursor-pointer hover:border-blue-300 transition">
                <div class="w-12 h-12 bg-green-600 rounded-xl mb-2 flex items-center justify-center text-white font-bold">K</div>
                <span class="text-xs font-bold text-slate-600 tracking-tight">Компаньон</span>
            </div>
            <div onclick="selectBank(this, 'O!Деньги')" class="bank-card border-2 border-slate-100 rounded-2xl p-4 flex flex-col items-center cursor-pointer hover:border-blue-300 transition">
                <div class="w-12 h-12 bg-slate-900 rounded-xl mb-2 flex items-center justify-center text-white font-bold">O!</div>
                <span class="text-xs font-bold text-slate-600 tracking-tight">O!Деньги</span>
            </div>
            <div onclick="selectBank(this, 'Симбанк')" class="bank-card border-2 border-slate-100 rounded-2xl p-4 flex flex-col items-center cursor-pointer hover:border-blue-300 transition">
                <div class="w-12 h-12 bg-blue-600 rounded-xl mb-2 flex items-center justify-center text-white font-bold">S</div>
                <span class="text-xs font-bold text-slate-600 tracking-tight">Симбанк</span>
            </div>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Номер телефона</label>
                <input type="text" id="phone" placeholder="+996" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none font-medium">
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2 ml-1">Сумма (сом)</label>
                <input type="number" id="amount" placeholder="Введите сумму" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-blue-500 outline-none font-medium">
            </div>

            <button onclick="sendRequest()" id="payBtn" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold text-lg hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-100 mt-4">
                Подтвердить и оплатить
            </button>
        </div>
    </div>

    <p class="text-center text-slate-400 text-[10px] mt-8 uppercase tracking-widest">Безопасные платежи BookCloud</p>
</main>

<script>
    const USER_ID = localStorage.getItem('userId');
    const token = localStorage.getItem('token');
    let selectedBank = "";

    function selectBank(el, name) {
        document.querySelectorAll('.bank-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        selectedBank = name;
    }

    async function sendRequest() {
        const amountValue = document.getElementById('amount').value;
        const phone = document.getElementById('phone').value;

        if (!selectedBank || !amountValue || !phone) {
            alert("Выберите банк и заполните все поля!");
            return;
        }

        const btn = document.getElementById('payBtn');
        btn.innerText = "Обработка...";
        btn.disabled = true;

        try {
            // ВАЖНО: Твой бэкенд ждет userId и amount как @RequestParam
            // Поэтому путь должен быть таким:
            const url = `/api/user/add-money?userId=${USER_ID}&amount=${amountValue}`;

            const response = await fetch(url, {
                method: 'PATCH',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (response.ok) {
                alert(`Успешно! Баланс пополнен на ${amountValue} сом через ${selectedBank}!`);
                location.href = 'profile.html';
            } else {
                const errorMsg = await response.text();
                alert("Ошибка сервера: " + errorMsg);
            }
        } catch (err) {
            console.error(err);
            alert("Ошибка соединения. Убедитесь, что бэкенд запущен.");
        } finally {
            btn.innerText = "Подтвердить и оплатить";
            btn.disabled = false;
        }
    }

    // ===== ТЁМНЫЙ РЕЖИМ =====
    function initDarkMode() {
        const isDark = localStorage.getItem('darkMode') === 'true';
        if (isDark) {
            document.getElementById('htmlRoot').classList.add('dark');
        }
        document.getElementById('themeBtnTopup').textContent = isDark ? '☀️' : '🌙';
    }

    function toggleDarkMode() {
        const htmlRoot = document.getElementById('htmlRoot');
        const isDark = htmlRoot.classList.toggle('dark');
        localStorage.setItem('darkMode', isDark);
        document.getElementById('themeBtnTopup').textContent = isDark ? '☀️' : '🌙';
    }

    initDarkMode();
</script>
</body>
</html>
