<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookCloud - Твоя онлайн библиотека</title>
    <script src="theme.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .book-img-container { height: 280px; width: 100%; border-radius: 1.5rem; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        body { transition: background-color 0.3s, color 0.3s; }
        .card-hover:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans dark:bg-[#111827] dark:text-white">

<header class="bg-white shadow-sm sticky top-0 z-50 dark:bg-[#1f2937] dark:shadow-none border-b dark:border-gray-700">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-black text-blue-600 tracking-tight cursor-pointer" onclick="location.reload()">
            📚 BookCloud
        </h1>

        <nav class="flex space-x-8 font-bold uppercase text-xs tracking-widest">
            <a href="#" onclick="location.reload()" class="text-blue-600 border-b-2 border-blue-600 pb-1">Каталог</a>
        </nav>

        <div class="flex items-center gap-4">
            <button id="themeToggle" onclick="toggleTheme()" class="p-2.5 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all">
                <span id="themeIcon" class="text-lg">☀️</span>
            </button>

            <div id="authArea" class="flex items-center gap-4"></div>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 py-12">
    <div class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6">
        <h2 class="text-4xl font-black italic uppercase tracking-tighter underline decoration-blue-600 decoration-4">Все книги</h2>

        <div class="flex gap-4 w-full md:w-auto">
            <input type="text" id="searchInput" placeholder="Поиск книги..."
                   class="flex-1 md:w-64 px-4 py-3 rounded-2xl border-none shadow-inner bg-gray-100 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none">

            <select id="categoryFilter" onchange="loadBooks()"
                    class="px-4 py-3 rounded-2xl bg-blue-600 text-white font-bold outline-none shadow-lg cursor-pointer hover:bg-blue-700 transition">
                <option value="">Все жанры</option>
                <option value="ФАНТАСТИКА">Фантастика</option>
                <option value="ХУДОЖЕСТВЕННАЯ">Художественная</option>
                <option value="НАУКА">Наука</option>
            </select>
        </div>
    </div>

    <div id="booksGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10">
    </div>
</main>

<script>
    const API_BOOK = '/api/book';
    const TOKEN = localStorage.getItem('token');
    const USER_ID = localStorage.getItem('userId');

    async function init() {
        initThemeIcon();
        renderAuth();
        await loadBooks();
    }

    // Профиль / Вход
    function renderAuth() {
        const container = document.getElementById('authArea');
        if (TOKEN) {
            container.innerHTML = `
                    <button onclick="safeLogout()" class="text-[10px] font-bold text-red-500 uppercase hover:underline mr-2">Выход</button>
                    <div onclick="location.href='profile.html'" class="w-10 h-10 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold border-2 border-blue-600 cursor-pointer hover:scale-110 transition">
                        ${USER_ID ? 'A' : 'U'}
                    </div>
                `;
        } else {
            container.innerHTML = `<a href="auth.html" class="px-6 py-2 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">ВХОД</a>`;
        }
    }

    // Загрузка данных
    async function loadBooks() {
        const grid = document.getElementById('booksGrid');
        const category = document.getElementById('categoryFilter').value;
        grid.innerHTML = '<div class="col-span-full text-center py-20 font-bold opacity-30 animate-pulse text-2xl">ЗАГРУЗКА КАТАЛОГА...</div>';

        let url = category ? `${API_BOOK}/search/books/category?category=${category}` : `${API_BOOK}/books`;

        try {
            const res = await fetch(url);
            const books = await res.json();
            renderBooks(books);
        } catch (err) {
            grid.innerHTML = `<div class="col-span-full text-center text-red-500 font-bold">Сервер не отвечает. Проверь Spring Boot.</div>`;
        }
    }

    // Отрисовка карточек
    function renderBooks(books) {
        const grid = document.getElementById('booksGrid');
        if (!books || books.length === 0) {
            grid.innerHTML = '<p class="col-span-full text-center py-20 opacity-50">Книги в этой категории отсутствуют</p>';
            return;
        }

        grid.innerHTML = books.map(b => `
                <div onclick="location.href='book-details.html?id=${b.id}'"
                     class="group card-hover bg-white dark:bg-gray-800 p-5 rounded-[2.5rem] shadow-sm border border-gray-100 dark:border-gray-700 hover:shadow-2xl transition-all cursor-pointer flex flex-col h-full">

                    <div class="book-img-container mb-6 bg-gray-50 dark:bg-gray-900 shadow-inner">
                        ${b.imageURL ?
            `<img src="${b.imageURL}" class="w-full h-full object-contain group-hover:scale-105 transition-transform" onerror="this.parentElement.innerHTML=getPlaceholder()">` :
            getPlaceholder()
        }
                    </div>

                    <div class="px-2 flex flex-col flex-1">
                        <h4 class="font-black text-xl line-clamp-1 mb-1 dark:text-white uppercase tracking-tight">${b.title || 'Без названия'}</h4>
                        <p class="text-gray-400 text-sm font-medium mb-4">${b.author || 'Автор не указан'}</p>

                        <div class="mt-auto flex justify-between items-center">
                            <span class="text-2xl font-black text-blue-600">${b.price} сом</span>
                            <div class="w-10 h-10 rounded-full bg-blue-50 dark:bg-gray-700 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <span class="text-xl">→</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    // Заглушка, если картинка не загрузилась (вместо спама в консоль)
    function getPlaceholder() {
        return `<svg class="w-16 h-16 text-gray-200 dark:text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>`;
    }

    // Поиск
    document.getElementById('searchInput').oninput = async (e) => {
        const val = e.target.value.trim();
        if (val.length === 0) return loadBooks();
        const res = await fetch(`${API_BOOK}/search/book/title?query=${encodeURIComponent(val)}`);
        if (res.ok) renderBooks(await res.json());
    };

    init();
</script>
</body>
</html>
