<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в Admin панель - BookCloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-600 to-blue-800 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-600 mb-2">📚 BookCloud</h1>
            <p class="text-gray-600">Admin Панель</p>
        </div>

        <form id="adminLoginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="admin@bookcloud.com">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-2">Пароль</label>
                <input type="password" id="password" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="••••••••">
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition mt-6">
                Войти в Admin
            </button>
        </form>

<!--        <div class="mt-6 p-4 bg-blue-50 rounded-lg text-sm text-gray-600">-->
<!--            <p class="font-semibold mb-2">Demo учетные данные:</p>-->
<!--            <p>Email: admin@bookcloud.com</p>-->
<!--            <p>Пароль: admin123</p>-->
<!--        </div>-->

        <div class="mt-4 text-center">
            <a href="welcome.html" class="text-blue-600 hover:underline text-sm">← Вернуться на главную</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('userId', data.id);

                if (data.role === 'ADMIN') {
                    localStorage.setItem('isAdmin', 'true');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert('У вас нет прав администратора');
                }
            } else {
                alert('Ошибка входа: ' + (data.error || 'Неверные данные'));
            }
        } catch (error) {
            console.error('Ошибка:', error);
            alert('Ошибка подключения к серверу');
        }
    });
</script>

</body>
</html>
